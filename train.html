<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Document</title>
	<style>
		#train{
			display: flex;
			gap: 12px;
		}
		.cart{
			border: 1px solid black;
			min-width: 100px;
			height: 80px;
			text-align: center;
		}
		.cart:before{
			content: "";
			width: 30px;
			height: 30px;
			border: 1px solid black;
			display: block;
			border-radius: 50%;
			position: relative;
			bottom: -70px;
			left: 10px;
			background-color: white;
		}
		.cart:after{
		}

	</style>
</head>
<body>
	<input type="text" id="person">
	<input type="color" id="colorPicker" value="#ff0000">
	<button id="add-person">add person</button>
	<button id="remove-last-person"> remove last person </button>

	<div id="train">
		
	</div>
	<script>

		let matty = {
		name: "matty",
		 studentId: "c29mk",
		 pronouns: "he/she",
		 fav_color: "blue"}

		 let dalton = {
		 	name: "dalton",
		 	year: 1919,
		 	studentNum: 500
		 }

		 let kendrick = {
		 	name: "kenny",
		 	studentId: "c29cp3",
		 	fav_color: "red",
		 }
		

		//let people = ["matt", "ken", "evren", "lukas", "zara", "jocelyn"]
		 let people = [matty, kendrick]
		 console.log(people)
		

		people.push({
			name: "evren",
			fav_color: "blue"
		})

		let train = document.getElementById ("train")

		for(let i = 0; i < people.length; i++){
			console.log(people[i])
			// create a new div
			let cart = document.createElement("div")
			
			cart.classList.add("cart")
			train.appendChild(cart)
			// add a class (cart) to this div
		}
		function makeTrain(){
		train.innerHTML = ""
			for(let i = 0; i < people.length; i++){
			console.log(people[i])
			let cart = document.createElement("div")
			cart.textContent = people[i].name
			cart.style.backgroundColor = people[i].fav_color
			console.log(people[i])
			cart.style.backgroundColor = people[i]
			cart.textContent = people[i]
			cart.classList.add("cart")
			train.appendChild(cart)
			
		}
	}
	makeTrain()

		let addPersonBtn = document.getElementById("add-person")
		addPersonBtn.addEventListener("click", function() {
			let personInput = document.getElementById("person")
			let colorInput = document.getElementById("colorPicker")
			//people.push(personInput.value)
			people.push({
				name: personInput.value,
				fav_color: colorPicker.value
			})
			
			makeTrain()
			personInput.value = ""
			console.log(people)
		})

		let removeLastPersonBtn = document.getElementById("remove-last-person")
		removeLastPersonBtn.addEventListener("click", function(){
			people.pop()
			makeTrain()
			console.log(people)

		})
	
	</script>
</body>
</html>
