<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Document</title>
	<style>
		.container {
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 16px;
		}

		.item {
			border: 1px solid black;

		}
	.item img {
		width: 100%;
		height: 100%;
		object-fit: cover;
	}
	#item1{
		/*grid-column: 1 / 3;
		grid-row: 1 / 3;*/
	}

	@media (max-width: 800px) {
		.container {
			grid-template-columns: 1fr;
		}
	}

	</style>
</head>
<body>
	<div class="container">
		<div class="item" id="item1">
			<img src="speed.png" alt="Speed">
		</div>
		<div class="item">
			<img src="speed.png" alt="Speed">
		</div>
		<div class="item">
			<img src="speed.png" alt="Speed">
		</div>
		<div class="item">
			<img src="speed.png" alt="Speed">
		</div>
		<div class="item">
			<img src="speed.png" alt="Speed">
		</div>
	</div>
</body>
</html>
